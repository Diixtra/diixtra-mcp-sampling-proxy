changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - renovate[bot]
  categories:
    - title: "Features"
      labels:
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "Documentation"
      labels:
        - documentation
    - title: "Maintenance"
      labels:
        - chore
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
